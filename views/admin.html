<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="/css/admin.css">
</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Admin</h2>

        <button class="tab-btn active" onclick="showSection('products', event)">Products</button>
        <button class="tab-btn" onclick="showSection('repairs', event)">Repairs</button>

        <button class="logout-btn" onclick="logout()">Logout</button>
    </aside>


    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- DASHBOARD -->
        <div class="dashboard">
            <div class="card">
                <h3 id="totalProducts">0</h3>
                <p>Total Products</p>
            </div>

            <div class="card">
                <h3 id="totalRepairs">0</h3>
                <p>Active Repairs</p>
            </div>
        </div>


        <!-- PRODUCTS SECTION -->
        <section id="productsSection">

            <h2>Add Product</h2>

            <form id="productForm" class="form">
                <select id="category" required>
                    <option value="mobiles">Mobiles</option>
                    <option value="electronics">Electronics</option>
                </select>

                <input type="text" id="name" placeholder="Product Name" required>
                <input type="text" id="price" placeholder="Price" required>

                <!-- image upload -->
                <input type="file" id="imageFile" accept="image/*">

                <input type="text" id="feature1" placeholder="Feature 1">
                <input type="text" id="feature2" placeholder="Feature 2">

                <button type="submit">Add Product</button>
            </form>

            <h2>All Products</h2>
            <div id="adminProductContainer" class="grid"></div>

        </section>


        <!-- REPAIRS SECTION -->
        <section id="repairsSection" style="display:none;">

            <h2>Add Repair</h2>

            <form id="repairForm" class="form">
                <input type="text" id="repairId" placeholder="Repair ID (R001)" required>
                <input type="text" id="customerName" placeholder="Customer Name" required>
                <input type="text" id="device" placeholder="Device" required>

                <select id="status">
                    <option>Pending</option>
                    <option>Ready</option>
                </select>

                <button type="submit">Add Repair</button>
            </form>

            <h2>All Repairs</h2>
            <div id="repairList" class="grid"></div>

        </section>

    </main>

</div>

<script src="/js/admin.js"></script>

</body>
</html>
